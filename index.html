<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Portfolio Card</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome for Logos/Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Syncopate & Space Grotesk for sharp, stylish look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0b0b0b;
            overflow: hidden;
        }
        .font-sharp {
            font-family: 'Syncopate', sans-serif;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        /* Custom Neon Pink Glows */
        .pink-glow {
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.6);
        }
        /* Card Layering and Animations */
        .card-container {
            perspective: 1000px;
        }
        .portfolio-card {
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            transform-style: preserve-3d;
        }
        /* Smooth Custom Scrollbar for Modal Panels */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #111;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #ff1493;
            border-radius: 3px;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-center items-center p-4">

    <!-- App Wrapper / Container -->
    <div class="relative w-full max-w-md h-[750px] card-container">
        
        <!-- Witty Overlay for Swipe Left ("Good Try") -->
        <div id="wittyOverlay" class="absolute inset-0 bg-[#0b0b0b]/95 z-50 rounded-3xl border-4 border-[#ff1493] flex flex-col justify-center items-center p-6 opacity-0 pointer-events-none transition-opacity duration-300">
            <h2 class="font-sharp text-4xl text-[#ff1493] mb-4 text-center text-glow">GOOD TRY, BUT NO.</h2>
            <p class="text-gray-400 text-center mb-6">Did you really think you could escape that easily?</p>
            <button onclick="resetToMain()" class="px-6 py-2 border-2 border-white text-white hover:bg-white hover:text-black font-bold uppercase tracking-wider rounded-full transition-all duration-200">
                Back to Reality
            </button>
        </div>

        <!-- ================= CARD 1: MAIN CARD ================= -->
        <div id="card1" class="portfolio-card absolute inset-0 w-full h-full bg-black rounded-3xl overflow-hidden border border-zinc-800 flex flex-col justify-between z-30 shadow-2xl">
            <!-- Full Page Background Picture Placeholder -->
            <div class="absolute inset-0 z-0 bg-cover bg-center opacity-80 mix-blend-luminosity" style="background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=800&q=80');">
                <!-- Dark Gradient Overlay -->
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
            </div>

            <!-- Header Info Top Links -->
            <div class="relative z-10 p-6 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
                <span class="font-sharp text-xs tracking-widest text-[#ff1493] font-bold">PORTFOLIO V1.0</span>
                <!-- Quick Socials -->
                <div class="flex gap-4 text-lg">
                    <a href="https://linkedin.com" target="_blank" class="hover:text-[#ff1493] transition-colors"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://instagram.com" target="_blank" class="hover:text-[#ff1493] transition-colors"><i class="fab fa-instagram"></i></a>
                    <a href="https://x.com" target="_blank" class="hover:text-[#ff1493] transition-colors"><i class="fab fa-x-twitter"></i></a>
                </div>
            </div>

            <!-- Identity Box (Bottom of Card 1) -->
            <div class="relative z-10 p-6 bg-gradient-to-t from-black via-black/90 to-transparent pt-20">
                <h1 class="font-sharp text-4xl font-bold mb-1 tracking-tight">YOUR NAME</h1>
                <p class="text-xs uppercase tracking-widest text-zinc-400 font-semibold mb-6 flex items-center gap-2">
                    <span class="inline-block w-2 h-2 rounded-full bg-[#ff1493] animate-pulse"></span>
                    Marketer & Brand Strategist
                </p>

                <!-- Swipe Controls HUD Interface -->
                <div class="grid grid-cols-2 gap-4 border-t border-zinc-800 pt-6">
                    <button onclick="swipeLeft()" class="flex flex-col items-start p-3 bg-zinc-900/50 hover:bg-zinc-900 rounded-xl border border-zinc-800 group transition-all text-left">
                        <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-1 group-hover:text-red-500">&larr; Swipe Left</span>
                        <span class="text-sm font-medium text-zinc-300">Exit Session</span>
                    </button>
                    <button onclick="swipeRight()" class="flex flex-col items-end p-3 bg-[#ff1493]/10 hover:bg-[#ff1493]/20 rounded-xl border border-[#ff1493]/30 group transition-all text-right pink-glow">
                        <span class="text-[10px] text-[#ff1493] font-bold uppercase tracking-widest mb-1 text-glow">Swipe Right &rarr;</span>
                        <span class="text-sm font-medium text-white">Enter Experience</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= CARD 2: INTERACTIVE DASHBOARD ================= -->
        <div id="card2" class="portfolio-card absolute inset-0 w-full h-full bg-black rounded-3xl overflow-hidden border border-zinc-800 p-6 flex flex-col justify-between z-20 opacity-0 pointer-events-none transform translate-x-12 scale-95">
            
            <!-- Dashboard Header -->
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4">
                <div>
                    <button onclick="backToMain()" class="text-xs text-zinc-400 hover:text-[#ff1493] transition-colors flex items-center gap-1 font-bold uppercase tracking-wider">
                        &larr; Main Menu
                    </button>
                </div>
                <div class="text-right">
                    <h2 class="font-sharp text-sm text-[#ff1493] font-bold text-glow">NAVIGATOR</h2>
                </div>
            </div>

            <!-- Grid Menu Categories -->
            <div class="grid grid-cols-2 gap-3 my-auto overflow-y-auto max-h-[500px] pr-1 custom-scroll">
                
                <!-- Experience -->
                <div onclick="openModal('experience')" class="bg-zinc-900/60 border border-zinc-800 p-4 rounded-2xl cursor-pointer hover:border-[#ff1493] hover:bg-zinc-900 transition-all flex flex-col justify-between h-32 group">
                    <div class="w-8 h-8 rounded-lg bg-[#ff1493]/10 flex items-center justify-center text-[#ff1493] group-hover:scale-110 transition-transform">
                        <i class="fas fa-briefcase"></i>
                    </div>
                    <span class="font-sharp text-xs font-bold tracking-wider">Experience</span>
                </div>

                <!-- Projects & Label -->
                <div onclick="openModal('projects')" class="bg-zinc-900/60 border border-zinc-800 p-4 rounded-2xl cursor-pointer hover:border-[#ff1493] hover:bg-zinc-900 transition-all flex flex-col justify-between h-32 group relative overflow-hidden">
                    <div class="absolute -right-2 -top-2 bg-[#ff1493] text-[9px] text-black font-bold uppercase py-1 px-3 rotate-12 tracking-tighter">Fashion Label</div>
                    <div class="w-8 h-8 rounded-lg bg-[#ff1493]/10 flex items-center justify-center text-[#ff1493]">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <span class="font-sharp text-xs font-bold tracking-wider">Projects</span>
                </div>

                <!-- Skills & Tools -->
                <div onclick="openModal('skills')" class="bg-zinc-900/60 border border-zinc-800 p-4 rounded-2xl cursor-pointer hover:border-[#ff1493] hover:bg-zinc-900 transition-all flex flex-col justify-between h-32 group">
                    <div class="w-8 h-8 rounded-lg bg-[#ff1493]/10 flex items-center justify-center text-[#ff1493]">
                        <i class="fas fa-tools"></i>
                    </div>
                    <span class="font-sharp text-xs font-bold tracking-wider">Skills & Tools</span>
                </div>

                <!-- Education -->
                <div onclick="openModal('education')" class="bg-zinc-900/60 border border-zinc-800 p-4 rounded-2xl cursor-pointer hover:border-[#ff1493] hover:bg-zinc-900 transition-all flex flex-col justify-between h-32 group">
                    <div class="w-8 h-8 rounded-lg bg-[#ff1493]/10 flex items-center justify-center text-[#ff1493]">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <span class="font-sharp text-xs font-bold tracking-wider">Education</span>
                </div>

                <!-- Achievements -->
                <div onclick="openModal('achievements')" class="bg-zinc-900/60 border border-zinc-800 p-4 rounded-2xl cursor-pointer hover:border-[#ff1493] hover:bg-zinc-900 transition-all flex flex-col justify-between h-32 group">
                    <div class="w-8 h-8 rounded-lg bg-[#ff1493]/10 flex items-center justify-center text-[#ff1493]">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <span class="font-sharp text-xs font-bold tracking-wider">Achievements</span>
                </div>

                <!-- Hobbies & Passion -->
                <div onclick="openModal('hobbies')" class="bg-zinc-900/60 border border-zinc-800 p-4 rounded-2xl cursor-pointer hover:border-[#ff1493] hover:bg-zinc-900 transition-all flex flex-col justify-between h-32 group">
                    <div class="w-8 h-8 rounded-lg bg-[#ff1493]/10 flex items-center justify-center text-[#ff1493]">
                        <i class="fas fa-heart"></i>
                    </div>
                    <span class="font-sharp text-xs font-bold tracking-wider">Hobbies & Fun</span>
                </div>

            </div>

            <!-- Integrated Direct Mail Box Layer -->
            <div class="border-t border-zinc-800 pt-4">
                <h3 class="text-xs uppercase font-bold tracking-widest text-[#ff1493] mb-2 flex items-center gap-1">
                    <i class="fas fa-paper-plane text-[10px]"></i> Drop a message
                </h3>
                <!-- Formspree Integration Placeholder (Replace with your actual Formspree ID code) -->
                <form action="https://formspree.io/f/YOUR_FORMSPREE_ID_HERE" method="POST" class="flex gap-2">
                    <input type="email" name="email" placeholder="Your Email" required class="bg-zinc-900 border border-zinc-800 text-xs rounded-xl px-3 py-2 w-1/3 focus:outline-none focus:border-[#ff1493]">
                    <input type="text" name="message" placeholder="Pitch me / Say hello..." required class="bg-zinc-900 border border-zinc-800 text-xs rounded-xl px-3 py-2 flex-1 focus:outline-none focus:border-[#ff1493]">
                    <button type="submit" class="bg-[#ff1493] hover:bg-pink-600 text-black text-xs font-bold px-3 py-2 rounded-xl transition-colors">Send</button>
                </form>
            </div>
        </div>

        <!-- ================= DYNAMIC MODAL PANELS (Content display layers) ================= -->
        <div id="contentModal" class="absolute inset-0 w-full h-full bg-black rounded-3xl border border-zinc-800 p-6 flex flex-col justify-between z-40 opacity-0 pointer-events-none transform translate-y-4 transition-all duration-300">
            
            <div class="flex justify-between items-center border-b border-zinc-800 pb-3">
                <h2 id="modalTitle" class="font-sharp text-lg text-[#ff1493] font-bold text-glow">Title</h2>
                <button onclick="closeModal()" class="text-zinc-500 hover:text-white transition-colors p-1 text-lg">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Dynamic Body Content Container (Scrollable) -->
            <div id="modalBody" class="flex-1 overflow-y-auto my-4 pr-1 text-sm text-zinc-300 space-y-4 custom-scroll">
                <!-- Javascript will paint content natively here -->
            </div>

            <div class="border-t border-zinc-800 pt-3 text-center">
                <span class="text-[10px] text-zinc-600 font-bold tracking-widest uppercase">Tap close icon to go back to grid</span>
            </div>
        </div>

    </div>

    <!-- Application Controller Logic Layer -->
    <script>
        const card1 = document.getElementById('card1');
        const card2 = document.getElementById('card2');
        const wittyOverlay = document.getElementById('wittyOverlay');
        const contentModal = document.getElementById('contentModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');

        // Card navigation systems
        function swipeRight() {
            card1.style.transform = 'translateX(-120%) rotate(-10deg)';
            card1.style.opacity = '0';
            card1.style.pointerEvents = 'none';

            card2.style.transform = 'translateX(0) scale(1)';
            card2.style.opacity = '1';
            card2.style.pointerEvents = 'auto';
        }

        function backToMain() {
            card1.style.transform = 'translateX(0) rotate(0deg)';
            card1.style.opacity = '1';
            card1.style.pointerEvents = 'auto';

            card2.style.transform = 'translateX(12%) scale(0.95)';
            card2.style.opacity = '0';
            card2.style.pointerEvents = 'none';
        }

        function swipeLeft() {
            card1.style.transform = 'translateX(120%) rotate(10deg)';
            card1.style.opacity = '0';
            wittyOverlay.classList.remove('pointer-events-none');
            wittyOverlay.classList.add('opacity-100');
        }

        function resetToMain() {
            wittyOverlay.classList.add('pointer-events-none');
            wittyOverlay.classList.remove('opacity-100');
            card1.style.transform = 'translateX(0) rotate(0deg)';
            card1.style.opacity = '1';
        }

        // Modal Content Injections
        const modalData = {
            experience: `
                <div class="space-y-4">
                    <div class="border-l-2 border-[#ff1493] pl-4 py-1">
                        <h4 class="font-bold text-white text-base">Senior Brand Strategist</h4>
                        <p class="text-xs text-[#ff1493] uppercase font-bold tracking-wider">Company Name &bull; 2024 - Present</p>
                        <p class="text-xs text-zinc-400 mt-1">Led high-impact go-to-market strategies boosting campaign conversions across modern digital segments.</p>
                    </div>
                    <div class="border-l-2 border-zinc-800 pl-4 py-1">
                        <h4 class="font-bold text-zinc-400 text-base">Marketing Specialist</h4>
                        <p class="text-xs text-zinc-500 uppercase font-bold tracking-wider">Previous Firm &bull; 2023 - 2024</p>
                        <p class="text-xs text-zinc-500 mt-1">Managed visual curation pipelines and developed scalable social ad copies.</p>
                    </div>
                </div>
            `,
            projects: `
                <div class="space-y-4">
                    <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800 relative">
                        <span class="absolute right-3 top-3 text-xs bg-[#ff1493]/20 text-[#ff1493] px-2 py-0.5 rounded font-bold">IG Label</span>
                        <h4 class="font-bold text-white text-base font-sharp tracking-wide">Custom Clothes Label</h4>
                        <p class="text-xs text-zinc-500 mb-2">2022 - 2023</p>
                        <p class="text-xs text-zinc-400">Founded, curated, and scaled a premium custom-built streetwear label purely leveraging organic Instagram loops and micro-influencer seedings.</p>
                    </div>
                    <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                        <h4 class="font-bold text-white text-base font-sharp tracking-wide">Project Alpha Growth Run</h4>
                        <p class="text-xs text-zinc-400">Scaled a digital consumer application's web footprint by 140% month-over-month utilizing low-budget clever viral loops.</p>
                    </div>
                </div>
            `,
            skills: `
                <div class="space-y-4">
                    <p class="text-xs text-zinc-400 uppercase tracking-widest font-bold mb-2">Core Arsenal</p>
                    <div class="flex flex-wrap gap-2">
                        <span class="bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 font-medium text-white"><i class="fab fa-figma text-purple-400"></i> Figma</span>
                        <span class="bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 font-medium text-white"><i class="fab fa-google text-blue-400"></i> Google Analytics 4</span>
                        <span class="bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 font-medium text-white"><i class="fab fa-meta text-blue-500"></i> Meta Ads Manager</span>
                        <span class="bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 font-medium text-white"><i class="fas fa-chart-line text-green-400"></i> Notion & CRM</span>
                        <span class="bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 font-medium text-white"><i class="fab fa-adobe text-red-500"></i> Photoshop</span>
                    </div>
                </div>
            `,
            education: `
                <div class="space-y-4">
                    <div class="border-b border-zinc-900 pb-3">
                        <h4 class="font-bold text-white text-base">B.S. in Marketing & Communications</h4>
                        <p class="text-xs text-[#ff1493] font-medium">University / School Name &bull; Graduated 2022</p>
                        <p class="text-xs text-zinc-500 mt-1">Specialized tracks in Digital Economies and Visual Media Architectures.</p>
                    </div>
                </div>
            `,
            achievements: `
                <div class="space-y-3">
                    <div class="flex items-start gap-3 p-2">
                        <div class="text-[#ff1493] mt-1"><i class="fas fa-award"></i></div>
                        <div>
                            <h5 class="font-bold text-sm text-white">Top 30 Under 30 Marketers</h5>
                            <p class="text-xs text-zinc-400">Nominated as an industry standout star for creative commerce direction.</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3 p-2">
                        <div class="text-[#ff1493] mt-1"><i class="fas fa-bolt"></i></div>
                        <div>
                            <h5 class="font-bold text-sm text-white">Best Bootstrapped Launch 2023</h5>
                            <p class="text-xs text-zinc-400">Recognized for growth velocity mechanics built during the IG fashion label stretch.</p>
                        </div>
                    </div>
                </div>
            `,
            hobbies: `
                <div class="space-y-4">
                    <p class="text-xs text-zinc-400">What keeps me ticking when screens go dark.</p>
                    
                    <!-- Hobbies loop with mock video placeholder -->
                    <div class="rounded-xl overflow-hidden border border-zinc-800 bg-zinc-950">
                        <div class="p-3 border-b border-zinc-800 flex justify-between items-center">
                            <span class="font-sharp text-xs font-bold tracking-wider flex items-center gap-1"><i class="fas fa-skating text-[#ff1493]"></i> Street Skating</span>
                            <span class="text-[10px] text-zinc-500 uppercase font-bold bg-zinc-900 px-2 py-0.5 rounded">Action Reel</span>
                        </div>
                        <!-- Video embed placeholder - replace src with a link to your real mp4 or short video -->
                        <div class="relative aspect-video bg-zinc-900 flex items-center justify-center">
                            <video class="w-full h-full object-cover" controls preload="none" poster="https://images.unsplash.com/photo-1564982009-871156843d2b?auto=format&fit=crop&w=600&q=80">
                                <source src="https://assets.mixkit.co/videos/preview/mixkit-skateboarding-under-a-bridge-43405-large.mp4" type="video/mp4">
                                Your browser does not support videos.
                            </video>
                        </div>
                    </div>

                    <div class="rounded-xl overflow-hidden border border-zinc-800 bg-zinc-950">
                        <div class="p-3 border-b border-zinc-800 flex justify-between items-center">
                            <span class="font-sharp text-xs font-bold tracking-wider flex items-center gap-1"><i class="fas fa-music text-[#ff1493]"></i> Making Lo-Fi Beats</span>
                            <span class="text-[10px] text-zinc-500 uppercase font-bold bg-zinc-900 px-2 py-0.5 rounded">Jam Session</span>
                        </div>
                        <div class="relative aspect-video bg-zinc-900 flex items-center justify-center">
                            <video class="w-full h-full object-cover" controls preload="none" poster="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=600&q=80">
                                <source src="https://assets.mixkit.co/videos/preview/mixkit-hands-of-a-dj-adjusting-sound-mixers-42861-large.mp4" type="video/mp4">
                                Your browser does not support videos.
                            </video>
                        </div>
                    </div>
                </div>
            `
        };

        function openModal(key) {
            modalTitle.textContent = key.toUpperCase();
            modalBody.innerHTML = modalData[key];
            
            contentModal.classList.remove('pointer-events-none');
            contentModal.classList.remove('opacity-0');
            contentModal.classList.add('opacity-100');
            contentModal.style.transform = 'translateY(0)';
        }

        function closeModal() {
            contentModal.classList.add('pointer-events-none');
            contentModal.classList.remove('opacity-100');
            contentModal.classList.add('opacity-0');
            contentModal.style.transform = 'translateY(16px)';
            
            // Pause any video players running when closing modal
            const videos = modalBody.getElementsByTagName('video');
            for (let v of videos) {
                v.pause();
            }
        }
    </script>
</body>
</html>
